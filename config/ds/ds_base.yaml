includes:
  - ../global.yaml

setup:
  action_mode: ds_base  # ds_none, ds_base, ds_none_coeff, ds_base_coeff
  output_size: 1  # (MUST MATCH ABOVE, 1 for none and base, 5 for the _coeff)

  epochs: 3000 # max number of training iterations

  batch_size: 5
  learning_rate: 0.03107728177311676
  initial_action_bias: 0.5146298937515881 # Initial bias as ratio of max_replenish (0.0-1.0)
  neurons_per_hidden_layer: [64, 64]
  inner_layer_activation: elu
  output_layer_activation: relu
  patience: 30  # Number of epochs to wait for improvement before early stopping
  scheduler_factor: 0.9362132230368285 # Factor by which learning rate is reduced when loss plateaus
