includes:
  - ../global.yaml

setup:
  model_name: ppo
  action_mode: rl_none_coeff  # rl_none, rl_base, rl_none_coeff, rl_base_coeff

  total_steps: 200000  # Total environment steps
  eval_freq: 2048  # Frequency of model evaluation (in steps)

  learning_rate: 3e-4
  n_steps: 2048
  batch_size: 256
  clip_range: 0.10
  vf_coef: 0.4
  max_grad_norm: 0.5
  n_epochs: 1
  target_kl: null
  patience: 10  # Number of evaluations without improvement before early stopping
  lr_min: 3e-5  # Minimum learning rate for learning rate scheduling
  lr_fraction: 0.9  # Fraction of total steps at which learning rate reaches minimum
  ent_coef: 0.1
  gamma: 0.99
  gae_lambda: 0.5
  initial_action_bias: 0.5  # Initial action bias as fraction of action space (0.0-1.0)
  net_arch: [256, 256]
